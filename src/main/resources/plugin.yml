main: ${PACKAGE}.${NAME}
name: ${NAME}
version: "${VERSION}"
api-version: "1.21.11"
author: mictali
description: A Treasure Hunting plugin
commands:
  info:
    description: Dumps info on all existing barrels to log
    usage: "/deadmanschestplugin info"
    permision: deadmanschest.info.use
  flush:
    description: Removes all existing barrels
    usage: "/deadmanschestplugin flush"
    permission: deadmanschest.flush.use

permissions:
  deadmanschest.info.use:
    description: Dumps a list of barrels that currently exist
    default: op
  deadmanschest.flush.use:
    description: Will remove all DMC components in the world except maps
    default: op
